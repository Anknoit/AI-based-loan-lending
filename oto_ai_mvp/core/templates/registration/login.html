<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTO Capital — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --oto-green:      #2BB780;
      --oto-green-dark: #1e9466;
      --oto-green-bg:   #e8f8f1;
      --oto-heading:    #1A3040;
      --oto-muted:      #8093A0;
      --oto-border:     #E8EBEE;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #F5F5F5;
      font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Full-width topbar matching the app */
    .login-topbar {
      background: #fff;
      border-bottom: 1px solid var(--oto-border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      box-shadow: 0 1px 3px rgba(26,48,64,0.06);
    }

    .oto-wordmark {
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .oto-wordmark .o { color: var(--oto-green); }
    .oto-wordmark .t { color: var(--oto-heading); }

    /* Centred card */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .login-card {
      background: #fff;
      border: 1px solid var(--oto-border);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(26,48,64,0.07);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px;
    }

    /* Logo mark inside card */
    .card-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2.5px solid var(--oto-green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }
    .card-logo::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--oto-green);
      opacity: 0.35;
    }
    .card-logo span {
      font-size: 0.72rem;
      font-weight: 900;
      color: var(--oto-green);
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .login-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--oto-heading);
      margin-bottom: 4px;
    }

    .login-sub {
      text-align: center;
      font-size: 0.82rem;
      color: var(--oto-muted);
      margin-bottom: 28px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--oto-heading);
      margin-bottom: 5px;
      display: block;
    }

    .form-control {
      border: 1px solid var(--oto-border);
      border-radius: 8px;
      font-size: 0.88rem;
      padding: 10px 14px;
      color: var(--oto-heading);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-control:focus {
      border-color: var(--oto-green);
      box-shadow: 0 0 0 3px rgba(43,183,128,0.15);
      outline: none;
    }

    .btn-login {
      width: 100%;
      background: var(--oto-green);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      padding: 11px;
      margin-top: 8px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }

    .btn-login:hover { background: var(--oto-green-dark); }

    .error-msg {
      background: #fff1f0;
      border: 1px solid #fca5a5;
      border-radius: 7px;
      color: #b91c1c;
      font-size: 0.82rem;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .login-footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      color: var(--oto-muted);
    }
  </style>
</head>
<body>

  <div class="login-topbar">
    <div class="oto-wordmark">
      <span class="o">O</span><span class="t">T</span><span class="o">O</span>
    </div>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="card-logo"><span>OTO</span></div>
      <div class="login-title">AI Console</div>
      <div class="login-sub">OTO Capital — Internal Lending Intelligence Panel</div>

      {% if form.errors %}
      <div class="error-msg">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="mb-3">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username"
                 class="form-control" placeholder="Enter username" autofocus required>
        </div>

        <div class="mb-4">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password"
                 class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn-login">Sign In →</button>
      </form>

    </div>
  </div>

  <div class="login-footer">
    OTO Capital · AI Lending Console · Internal Use Only
  </div>

</body>
</html>
